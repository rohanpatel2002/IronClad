version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ironclad-postgres
    environment:
      POSTGRES_USER: ironclad
      POSTGRES_PASSWORD: ironclad_dev
      POSTGRES_DB: ironclad
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../postgres/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ironclad"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ironclad-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  opa:
    image: openpolicyagent/opa:0.64.1-static
    container_name: ironclad-opa
    ports:
      - "8181:8181"
    volumes:
      - ../opa:/etc/opa
    command:
      - "run"
      - "--server"
      - "--log-level=debug"
      - "/etc/opa/policy.rego"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8181/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ironclad-rabbitmq
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:1.56
    container_name: ironclad-jaeger
    ports:
      - "16686:16686" # Web UI
      - "4318:4318"   # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  topology-go:
    build:
      context: ../../services/topology-go
      dockerfile: Dockerfile
    container_name: ironclad-topology
    ports:
      - "8081:8081"
    environment:
      TOPOLOGY_PORT: "8081"
      GIN_MODE: release
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
    depends_on:
      - jaeger
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  scoring-python:
    build:
      context: ../../services/scoring-python
      dockerfile: Dockerfile
    container_name: ironclad-scoring
    ports:
      - "8083:8083"
    environment:
      SCORING_PORT: "8083"
      DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  semantic-python:
    build:
      context: ../../services/semantic-python
      dockerfile: Dockerfile
    container_name: ironclad-semantic
    ports:
      - "8082:8082"
    environment:
      SEMANTIC_PORT: "8082"
      DEBUG: "false"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  gate-go:
    build:
      context: ../../services/gate-go
      dockerfile: Dockerfile
    container_name: ironclad-gate
    ports:
      - "8080:8080"
    environment:
      GATE_PORT: "8080"
      GIN_MODE: release
      TOPOLOGY_URL: "http://topology-go:8081"
      SCORING_URL: "http://scoring-python:8083"
      SEMANTIC_URL: "http://semantic-python:8082"
      DATABASE_URL: "postgres://ironclad:ironclad_dev@postgres:5432/ironclad"
      REDIS_URL: "redis://redis:6379"
      OPA_URL: "http://opa:8181/v1/data/ironclad/authz/allow"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
    depends_on:
      postgres:
        condition: service_healthy
      topology-go:
        condition: service_healthy
      scoring-python:
        condition: service_healthy
      semantic-python:
        condition: service_healthy
      redis:
        condition: service_healthy
      opa:
        condition: service_healthy
      jaeger:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: ironclad-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    depends_on:
      gate-go:
        condition: service_healthy
      topology-go:
        condition: service_healthy

  grafana:
    image: grafana/grafana:10.4.2
    container_name: ironclad-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ironclad
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/etc/grafana/dashboards:ro
      - grafdata:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  pgdata:
  grafdata:

